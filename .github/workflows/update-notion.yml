name: Update Notion on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Call Notion API
        run: |
          curl -X POST "https://api.notion.com/v1/pages" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Content-Type: application/json" \
          -H "Notion-Version: 2022-06-28" \
          --data '{
            "parent": { "database_id": "'"${{ secrets.NOTION_DATABASE_ID }}"'" },
            "properties": {
              "Name": {
                "title": [
                  { "text": { "content": "PR 合併紀錄 - '${{ github.event.pull_request.title }}'" } }
                ]
              },
              "GitHub Link": {
                "url": "'"${{ github.event.pull_request.html_url }}"'"
              },
              "Merged By": {
                "rich_text": [
                  { "text": { "content": "'"${{ github.event.pull_request.user.login }}"'" } }
                ]
              },
              "Commit Message": {
                "rich_text": [
                  { "text": { "content": "'"${{ github.event.pull_request.body }}"'" } }
                ]
              }
            }
          }'
